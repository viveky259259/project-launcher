name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Rust library (Universal)
        run: |
          cd rust
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/libproject_launcher_core.dylib \
            target/aarch64-apple-darwin/release/libproject_launcher_core.dylib \
            -output target/universal-apple-darwin/release/libproject_launcher_core.dylib

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter app
        run: flutter build macos --release

      - name: Copy native library to app bundle
        run: |
          mkdir -p "build/macos/Build/Products/Release/Project Launcher.app/Contents/Frameworks"
          cp rust/target/universal-apple-darwin/release/libproject_launcher_core.dylib \
             "build/macos/Build/Products/Release/Project Launcher.app/Contents/Frameworks/"

      - name: Create DMG
        run: |
          # Install create-dmg
          brew install create-dmg

          # Create DMG
          create-dmg \
            --volname "Project Launcher" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Project Launcher.app" 150 180 \
            --app-drop-link 450 180 \
            --hide-extension "Project Launcher.app" \
            "Project-Launcher-${{ steps.version.outputs.VERSION }}.dmg" \
            "build/macos/Build/Products/Release/Project Launcher.app"

      - name: Create ZIP
        run: |
          cd "build/macos/Build/Products/Release"
          zip -r "../../../../../Project-Launcher-${{ steps.version.outputs.VERSION }}.zip" "Project Launcher.app"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Project-Launcher-${{ steps.version.outputs.VERSION }}.dmg
            Project-Launcher-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    if: "!contains(github.ref, '-')"  # Skip for pre-releases

    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Homebrew Cask (manual step reminder)
        run: |
          echo "============================================="
          echo "Release complete! Next steps:"
          echo ""
          echo "1. Calculate SHA256 of the DMG:"
          echo "   shasum -a 256 Project-Launcher-${{ steps.version.outputs.VERSION }}.dmg"
          echo ""
          echo "2. Submit PR to homebrew-cask with updated version and SHA"
          echo "============================================="
